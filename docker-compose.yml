services:
  jupyter:
    build:
      context: .
      dockerfile: docker/jupyter.Dockerfile
    container_name: aviation-jupyter
    ports:
      - "8888:8888"
      - "4040-4042:4040-4042"
    env_file:
      - .env
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "${JUPYTER_TOKEN}"
      # Override SPARK_HOME to use pip-installed pyspark 4.0.0 JARs,
      # NOT the base image's pre-installed Spark 4.1.1 at /usr/local/spark.
      # Driver and cluster must use the same version JARs.
      SPARK_HOME: /opt/conda/lib/python3.13/site-packages/pyspark
      # Tell PySpark which Python workers should use (must match driver = 3.13)
      PYSPARK_PYTHON: python3.13
    volumes:
      - ./:/home/jovyan/work
      - ./:/workspace
      - spark-models:/spark-models
    depends_on:
      - minio
      - kafka
    networks:
      - aviation-net

  minio:
    image: minio/minio:latest
    container_name: aviation-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    volumes:
      - minio-data:/data
    networks:
      - aviation-net

  mc:
    image: minio/mc:latest
    container_name: aviation-mc
    depends_on:
      - minio
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c " sleep 8; mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; mc mb -p local/raw || true; mc mb -p local/lakehouse || true; mc mb -p local/warehouse || true; mc mb -p local/mlflow || true; mc ls local; exit 0; "
    networks:
      - aviation-net

  kafka:
    image: apache/kafka:3.7.0
    container_name: aviation-kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - aviation-net
  spark-master:
    build:
      context: .
      dockerfile: docker/spark.Dockerfile
    container_name: aviation-spark-master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./:/workspace
      - spark-models:/spark-models
    networks:
      - aviation-net

  spark-worker:
    build:
      context: .
      dockerfile: docker/spark.Dockerfile
    container_name: aviation-spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - ./:/workspace
      - spark-models:/spark-models
    networks:
      - aviation-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    container_name: aviation-mlflow
    command: >
      mlflow server --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - mlflow-data:/mlflow
    depends_on:
      - minio
      - mc
    networks:
      - aviation-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aviation-kafka-ui
    ports:
      - "8085:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: aviation-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - aviation-net

volumes:
  minio-data:
  kafka-data:
  mlflow-data:
  spark-models:

networks:
  aviation-net:
    driver: bridge
