services:
  postgres:
    image: postgres:16
    container_name: bdp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AIRFLOW_DB: ${AIRFLOW_DB}
      AIRFLOW_DB_USER: ${AIRFLOW_DB_USER}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      MLFLOW_DB: ${MLFLOW_DB}
      MLFLOW_DB_USER: ${MLFLOW_DB_USER}
      MLFLOW_DB_PASSWORD: ${MLFLOW_DB_PASSWORD}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./compose/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"
    networks: [bdp]

  minio:
    image: minio/minio:latest
    container_name: bdp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - ./volumes/minio:/data
    networks: [bdp]

  minio-init:
    image: minio/mc:latest
    container_name: bdp-minio-init
    depends_on:
      - minio
    entrypoint: /bin/sh
    command: >
      -c '
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      mc mb -p local/raw || true;
      mc mb -p local/bronze || true;
      mc mb -p local/silver || true;
      mc mb -p local/gold || true;
      mc mb -p local/mlflow || true;
      exit 0;
      '
    networks: [bdp]

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: bdp-kafka
    restart: unless-stopped
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_LOG_RETENTION_HOURS: "24"
      KAFKA_LOG_SEGMENT_BYTES: "134217728"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_HEAP_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9092:9092"
    volumes:
      - ./volumes/kafka:/var/lib/kafka/data
    networks: [bdp]

  spark-master:
    build:
      context: ./docker/spark
      args:
        SPARK_BASE_IMAGE: apache/spark:3.5.1-java17-python3
        DELTA_VERSION: 3.1.0
        HADOOP_AWS_VERSION: 3.3.4
        AWS_SDK_BUNDLE_VERSION: 1.12.262
    container_name: bdp-spark-master
    restart: unless-stopped
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT_NUMBER: "7077"
      SPARK_MASTER_WEBUI_PORT_NUMBER: "8080"
      SPARK_DAEMON_MEMORY: 1g
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./:/workspace
      - ./volumes/spark-events:/tmp/spark-events
    networks: [bdp]

  spark-worker:
    build:
      context: ./docker/spark
      args:
        SPARK_BASE_IMAGE: apache/spark:3.5.1-java17-python3
        DELTA_VERSION: 3.1.0
        HADOOP_AWS_VERSION: 3.3.4
        AWS_SDK_BUNDLE_VERSION: 1.12.262
    container_name: bdp-spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_WEBUI_PORT_NUMBER: "8081"
      SPARK_DAEMON_MEMORY: 1g
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./:/workspace
      - ./volumes/spark-events:/tmp/spark-events
    networks: [bdp]

  mlflow:
    build:
      context: ./docker/mlflow
    container_name: bdp-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://${MLFLOW_DB_USER}:${MLFLOW_DB_PASSWORD}@postgres:5432/${MLFLOW_DB}
      --default-artifact-root s3://mlflow/
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./:/workspace
    networks: [bdp]

  devbox:
    build:
      context: ./docker/devbox
    container_name: bdp-devbox
    profiles: ["dev"]
    tty: true
    stdin_open: true
    command: sleep infinity
    volumes:
      - ./:/workspace
      - ./volumes/bentoml:/root/bentoml
    working_dir: /workspace
    environment:
      APP_ENV: dev
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_EXPORT_URI: s3://mlflow/serving/current/
      PYTHONUNBUFFERED: "1"
    depends_on:
      - kafka
      - minio
      - spark-master
      - mlflow
    networks: [bdp]

  prometheus:
    image: prom/prometheus:latest
    container_name: bdp-prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./compose/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - minio
    networks: [bdp]

  grafana:
    image: grafana/grafana-oss:latest
    container_name: bdp-grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    user: "0:0"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./volumes/grafana:/var/lib/grafana
      - ./compose/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./compose/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks: [bdp]

  airflow-init:
    build:
      context: ./docker/airflow
    container_name: bdp-airflow-init
    profiles: ["airflow"]
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      COMPOSE_PROJECT_NAME: big-data-project
      HOST_PROJECT_DIR: /home/guggella-chaitanya-reddy/big-data-project
      TZ: ${TZ}
    user: "0:0"
    volumes:
      - ./src/airflow/dags:/opt/airflow/dags
      - ./src/airflow/logs:/opt/airflow/logs
      - ./src/airflow/plugins:/opt/airflow/plugins
      - ./src/airflow/config:/opt/airflow/config
      - ./:/opt/airflow/app
      - ./:/home/guggella-chaitanya-reddy/big-data-project
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password ${AIRFLOW_ADMIN_PASSWORD}
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com || true
      "
    networks: [bdp]

  airflow-webserver:
    build:
      context: ./docker/airflow
    container_name: bdp-airflow-web
    profiles: ["airflow"]
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    user: "0:0"
    command: airflow webserver
    ports:
      - "127.0.0.1:8088:8080"
    volumes:
      - ./src/airflow/dags:/opt/airflow/dags
      - ./src/airflow/logs:/opt/airflow/logs
      - ./src/airflow/plugins:/opt/airflow/plugins
      - ./src/airflow/config:/opt/airflow/config
      - ./:/opt/airflow/app
      - ./:/home/guggella-chaitanya-reddy/big-data-project
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [bdp]

  airflow-scheduler:
    build:
      context: ./docker/airflow
    container_name: bdp-airflow-scheduler
    profiles: ["airflow"]
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    user: "0:0"
    command: airflow scheduler
    volumes:
      - ./src/airflow/dags:/opt/airflow/dags
      - ./src/airflow/logs:/opt/airflow/logs
      - ./src/airflow/plugins:/opt/airflow/plugins
      - ./src/airflow/config:/opt/airflow/config
      - ./:/opt/airflow/app
      - ./:/home/guggella-chaitanya-reddy/big-data-project
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [bdp]

networks:
  bdp:
    driver: bridge
